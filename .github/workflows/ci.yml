name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff format --check .
          ruff check .

      - name: Audit dependencies for known CVEs (pip-audit)
        # Shipped runtime deps are patched via pyproject floors
        # (requests>=2.33.0, urllib3>=2.7.0). The ignores below are CI-only
        # tooling (pip itself, pytest, filelock) with no installable fix in the
        # pinned runner environment — they are not part of the published wheel.
        run: |
          pip-audit \
            --ignore-vuln PYSEC-2026-196 \
            --ignore-vuln GHSA-58qw-9mgm-455v \
            --ignore-vuln GHSA-jp4c-xjxw-mgf9 \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln GHSA-w853-jp5j-5j7f \
            --ignore-vuln GHSA-qmgc-5h2g-mvrw

      - name: Run tests with coverage
        run: |
          pytest -v --cov=presidio_requests --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml
